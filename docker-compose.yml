services:
  postgres:
    image: postgres:15-alpine
    container_name: gestion-immo-postgres
    environment:
      POSTGRES_DB: gestion_immobiliere
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./SystemImmo.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - immobiliere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: immobiliere-redis
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      - immobiliere-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: gestion-immo-redisinsight
    ports:
      - "5540:5540"
    networks:
      - immobiliere-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: gestion-immo-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - immobiliere-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: gestion-immo-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/gestion_immobiliere
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_MINIO_ENDPOINT=http://minio:9000
      - APP_MINIO_PUBLIC_ENDPOINT=http://localhost:9000
      - APP_MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - APP_MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - APP_MINIO_BUCKET=medias-immobilier
      - APP_MINIO_BUCKET_DOCUMENTS=documents
      - APP_MEDIAS_MAX_SIZE_IMAGE_MO=5
      - APP_MEDIAS_MAX_SIZE_VIDEO_MO=50
      - SPRING_MAIL_HOST=mailhog
      - SPRING_MAIL_PORT=1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped
    networks:
      - immobiliere-network

  # docker-compose.yml — nouveau service
  mailhog:
    image: mailhog/mailhog:latest
    container_name: gestion-immo-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web pour voir les mails reçus
    networks:
      - immobiliere-network
    restart: unless-stopped
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio_data:
    driver: local

networks:
  immobiliere-network:
    driver: bridge